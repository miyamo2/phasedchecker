name: Go Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-closed-without-merging:
    if: github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Skip tests for closed PR
        run: echo "Pull request closed without merge; skipping test job."
  test:
    needs:
      - check-closed-without-merging
    if: ${{ always() && needs.check-closed-without-merging.result == 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - name: Restore Go cache
        id: restore-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run octocov
        uses: k1LoW/octocov-action@v1
        env:
          GITHUB_PULL_REQUEST_NUMBER: ${{ github.event.number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Go cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('**/go.sum') }}